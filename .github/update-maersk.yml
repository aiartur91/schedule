name: Update Maersk schedules (Maersk API only)

# Pulls ONLY Maersk from the official Maersk DCSA API into sailings.csv.
# (All other carriers come from IQAX in update-iqax.yml.)
#
# Lanes split by COUNTRY PAIR (origin country → destination country) so each
# run stays small. Runs at 07:00 UTC — after IQAX (05:00) — to avoid push clashes.
#
# Scheduled spread:
#   • Monday    07:00 UTC → China               (cn = 48)
#   • Tuesday   07:00 UTC → India · PL/NL/BE     (in-pl,in-nl,in-be = 33)
#   • Wednesday 07:00 UTC → India · DE           (in-de = 33)
#   • Thursday  07:00 UTC → Bangladesh+Vietnam   (bd,vn = 48)
#
# Manual run: Actions → this workflow → Run workflow → pick a country pair.
#
# SETUP (one time): Settings → Secrets and variables → Actions → New secret
#   MAERSK_API_KEY = your Maersk Consumer-Key

on:
  schedule:
    - cron: '0 7 * * 1'   # Mon → cn
    - cron: '0 7 * * 2'   # Tue → in-pl,in-nl,in-be
    - cron: '0 7 * * 3'   # Wed → in-de
    - cron: '0 7 * * 4'   # Thu → bd,vn
  workflow_dispatch:
    inputs:
      lane_group:
        description: 'Country pair to pull'
        type: choice
        default: cn-pl
        options:
          - cn-pl
          - cn-de
          - cn-nl
          - cn-be
          - in-pl
          - in-de
          - in-nl
          - in-be
          - bd-pl
          - bd-de
          - bd-nl
          - bd-be
          - vn-pl
          - vn-de
          - vn-nl
          - vn-be
          - all
      debug:
        description: 'Write maersk-raw.json for mapping checks'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pick lane group
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 7 * * 1") echo "group=cn"                   >> "$GITHUB_OUTPUT" ;;
              "0 7 * * 2") echo "group=in-pl,in-nl,in-be"    >> "$GITHUB_OUTPUT" ;;
              "0 7 * * 3") echo "group=in-de"                >> "$GITHUB_OUTPUT" ;;
              "0 7 * * 4") echo "group=bd,vn"                >> "$GITHUB_OUTPUT" ;;
              *)           echo "group=cn"                   >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "group=${{ inputs.lane_group }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Maersk schedules
        env:
          MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
          LANE_GROUP: ${{ steps.pick.outputs.group }}
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            node scripts/fetch-maersk.mjs --debug
          else
            node scripts/fetch-maersk.mjs
          fi

      - name: Commit changes
        run: |
          git config user.name  "sailingi-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add sailings.csv maersk-raw.json 2>/dev/null || git add sailings.csv
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh Maersk (${{ steps.pick.outputs.group }}) $(date -u +%Y-%m-%d)"
            git push
          fi
