<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sailingi · Edytor danych</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c1c2e; --ink-2:#25384e; --ink-3:#4a5d74; --mute:#74859b; --faint:#9fadbf;
    --line:#e2e8f0; --line-2:#eef2f7; --bg:#f4f7fb; --bg-2:#eaf0f7; --surface:#fff;
    --navy:#0b2f54; --navy-2:#103f6e; --sea:#1d6fa5; --sea-2:#2b8cc4; --sea-soft:#e7f1f8; --sea-line:#c2dbeb;
    --amber:#c47d12; --amber-soft:#fbf0d9; --green:#1f7a47; --green-soft:#e2f0e7; --red:#b3402f; --red-soft:#f8e4df;
    --radius:12px; --radius-sm:8px;
    --shadow-sm:0 1px 2px rgba(11,47,84,.06),0 1px 1px rgba(11,47,84,.04);
    --shadow:0 2px 4px rgba(11,47,84,.05),0 8px 24px -12px rgba(11,47,84,.22);
    --shadow-lg:0 12px 40px -12px rgba(11,47,84,.32);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  #root{min-height:100%;}
  button{font-family:inherit;cursor:pointer;}
  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
  .scroll{scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  .scroll::-webkit-scrollbar{width:9px;height:9px;}
  .scroll::-webkit-scrollbar-thumb{background:#d4dde8;border-radius:6px;border:2px solid var(--bg);}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:16px;height:56px;padding:0 22px;background:var(--navy);color:#fff;position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;}
  .brand .name{font-size:16px;} .brand .tag{font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#9cc3e0;background:rgba(255,255,255,.08);padding:2px 7px;border-radius:5px;}
  .topbar .spacer{flex:1;}
  .topbar a.back{color:#bcd3e7;text-decoration:none;font-size:13.5px;font-weight:500;padding:6px 12px;border-radius:7px;}
  .topbar a.back:hover{color:#fff;background:rgba(255,255,255,.08);}

  /* layout */
  .wrap{max-width:1180px;margin:0 auto;padding:22px;display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:20px;align-items:start;}
  @media (max-width:920px){.wrap{grid-template-columns:1fr;}}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
  .panel-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line-2);}
  .panel-hd h2{margin:0;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .panel-hd .sub{font-size:12px;color:var(--mute);}
  .panel-bd{padding:16px 18px;}

  /* form */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .field{display:flex;flex-direction:column;gap:5px;min-width:0;}
  .field>label{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--mute);}
  .field .req{color:var(--red);}
  .ctrl,.ctrl select,.ctrl input{font:inherit;}
  .ctrl{height:38px;border:1.5px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);padding:0 10px;display:flex;align-items:center;gap:7px;color:var(--ink);transition:border-color .12s,box-shadow .12s;}
  .ctrl:focus-within{border-color:var(--sea);box-shadow:0 0 0 3px var(--sea-soft);}
  .ctrl select,.ctrl input{border:none;outline:none;background:transparent;width:100%;min-width:0;color:inherit;}
  .seg{display:inline-flex;border:1.5px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;height:38px;}
  .seg button{border:none;background:var(--surface);padding:0 14px;font-size:13.5px;font-weight:600;color:var(--ink-3);display:flex;align-items:center;gap:6px;}
  .seg button.on{background:var(--navy);color:#fff;}
  .calc{display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--mute);margin-top:2px;}
  .calc b{color:var(--ink);font-weight:700;}
  .hr{height:1px;background:var(--line-2);margin:16px 0;}
  .collapse-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--mute);cursor:pointer;user-select:none;}
  .collapse-h .chev{transition:transform .15s;}
  .collapse-h.open .chev{transform:rotate(90deg);}

  .btn{height:38px;border-radius:var(--radius-sm);border:1.5px solid transparent;padding:0 15px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:background .12s,border-color .12s,color .12s,transform .04s;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--sea);color:#fff;} .btn-primary:hover{background:var(--sea-2);}
  .btn-navy{background:var(--navy);color:#fff;} .btn-navy:hover{background:var(--navy-2);}
  .btn-ghost{background:var(--surface);border-color:var(--line);color:var(--ink-2);} .btn-ghost:hover{border-color:#cdd8e4;background:var(--bg);}
  .btn-soft{background:var(--sea-soft);color:var(--navy);} .btn-soft:hover{background:#d8e8f3;}
  .btn-danger{background:var(--surface);border-color:var(--red-soft);color:var(--red);} .btn-danger:hover{background:var(--red-soft);}
  .btn-sm{height:32px;padding:0 11px;font-size:13px;border-radius:7px;}
  .btn[disabled]{opacity:.45;pointer-events:none;}
  .btn-block{width:100%;justify-content:center;}

  /* paste assist */
  .paste-box{border:1.5px dashed var(--sea-line);background:var(--sea-soft);border-radius:var(--radius-sm);padding:12px;}
  .paste-box textarea{width:100%;min-height:46px;border:1.5px solid var(--line);border-radius:7px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;outline:none;background:#fff;}
  .paste-box textarea:focus{border-color:var(--sea);box-shadow:0 0 0 3px rgba(43,140,196,.15);}
  .paste-hint{font-size:12px;color:var(--ink-3);margin-bottom:8px;line-height:1.5;}
  .paste-map{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .paste-map .tok{font-size:11px;background:#fff;border:1px solid var(--sea-line);border-radius:5px;padding:2px 7px;color:var(--navy);}
  .paste-map .tok b{color:var(--sea);}

  /* table */
  .tablewrap{overflow-x:auto;}
  table.rows{border-collapse:separate;border-spacing:0;width:100%;font-size:13px;}
  table.rows th{position:sticky;top:0;background:var(--bg-2);text-align:left;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--mute);padding:9px 10px;white-space:nowrap;border-bottom:1px solid var(--line);}
  table.rows td{padding:9px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle;white-space:nowrap;}
  table.rows tr:hover td{background:var(--bg);}
  .cmk{display:inline-flex;align-items:center;gap:6px;}
  .cmk .sw{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:9px;font-weight:800;}
  .pill{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:5px;font-size:11px;font-weight:600;}
  .pill.direct{background:var(--green-soft);color:var(--green);} .pill.ts{background:var(--sea-soft);color:var(--sea);}
  .rowact{display:flex;gap:4px;}
  .iconbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--ink-3);}
  .iconbtn:hover{border-color:var(--sea-line);color:var(--sea);background:var(--sea-soft);}
  .iconbtn.del:hover{border-color:var(--red-soft);color:var(--red);background:var(--red-soft);}

  .empty{padding:40px 20px;text-align:center;color:var(--faint);}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .count-badge{font-size:13px;color:var(--mute);} .count-badge b{color:var(--ink);font-weight:700;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:60;background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:9px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .note{font-size:12.5px;color:var(--ink-3);background:var(--amber-soft);border:1px solid #ecd8a8;border-radius:8px;padding:9px 12px;line-height:1.5;}
  .err-field{border-color:var(--red)!important;box-shadow:0 0 0 3px var(--red-soft)!important;}
  .help{font-size:12px;color:var(--mute);margin-top:3px;}
  a.linkish{color:var(--sea);text-decoration:none;font-weight:600;} a.linkish:hover{text-decoration:underline;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="hifi-d-data.js"></script>
<script type="text/babel" src="sailing-editor.jsx"></script>
<script type="text/babel" src="sailing-editor-ui.jsx"></script>
</body>
</html>
