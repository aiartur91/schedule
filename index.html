<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sailingi · Schedule search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* ink / neutrals — cool, slightly blue-tinted */
    --ink:        #0c1c2e;
    --ink-2:      #25384e;
    --ink-3:      #4a5d74;
    --mute:       #74859b;
    --faint:      #9fadbf;
    --line:       #e2e8f0;
    --line-2:     #eef2f7;
    --bg:         #f4f7fb;
    --bg-2:       #eaf0f7;
    --surface:    #ffffff;

    /* brand — deep maritime navy + sea blue */
    --navy:       #0b2f54;
    --navy-2:     #103f6e;
    --sea:        #1d6fa5;
    --sea-2:      #2b8cc4;
    --sea-soft:   #e7f1f8;
    --sea-line:   #c2dbeb;

    /* accents */
    --amber:      #c47d12;
    --amber-soft: #fbf0d9;
    --green:      #1f7a47;
    --green-soft: #e2f0e7;
    --red:        #b3402f;
    --red-soft:   #f8e4df;

    --radius:     12px;
    --radius-sm:  8px;
    --shadow-sm:  0 1px 2px rgba(11,47,84,.06), 0 1px 1px rgba(11,47,84,.04);
    --shadow:     0 2px 4px rgba(11,47,84,.05), 0 8px 24px -12px rgba(11,47,84,.22);
    --shadow-lg:  0 12px 40px -12px rgba(11,47,84,.32);

    --row-h: 1;       /* density multiplier, tweakable */
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }
  button { font-family: inherit; cursor: pointer; }
  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ── scrollbars ── */
  .scroll { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .scroll::-webkit-scrollbar-thumb { background: #d4dde8; border-radius: 6px; border: 2px solid var(--bg); }
  .scroll::-webkit-scrollbar-thumb:hover { background: #c0ccda; }

  /* ── app frame ── */
  .app { display:flex; flex-direction:column; height:100%; }

  /* top bar */
  .topbar {
    display:flex; align-items:center; gap:16px;
    height: 56px; padding: 0 20px; flex:0 0 auto;
    background: var(--navy);
    color:#fff;
  }
  .brand { display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:-.2px; }
  .brand .logo { width:30px; height:30px; display:grid; place-items:center; }
  .brand .name { font-size:16px; }
  .brand .tag { font-size:10.5px; font-weight:600; letter-spacing:.8px; text-transform:uppercase;
    color:#9cc3e0; background: rgba(255,255,255,.08); padding:2px 7px; border-radius:5px; }
  .topbar .spacer { flex:1; }
  .topnav { display:flex; gap:4px; }
  .topnav a { color:#bcd3e7; text-decoration:none; font-size:13.5px; font-weight:500; padding:6px 12px; border-radius:7px; }
  .topnav a.active { color:#fff; background: rgba(255,255,255,.1); }
  .topnav a:hover:not(.active) { color:#fff; background: rgba(255,255,255,.05); }
  .topbar .user { width:32px; height:32px; border-radius:50%; background: linear-gradient(135deg,#2b8cc4,#1d6fa5);
    display:grid; place-items:center; font-weight:700; font-size:12.5px; color:#fff; }

  /* ── search bar ── */
  .searchbar {
    flex:0 0 auto; background: var(--surface); border-bottom:1px solid var(--line);
    padding: 14px 20px;
    display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap; row-gap:12px;
    box-shadow: var(--shadow-sm);
    position: relative; z-index: 5;
  }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field > label { font-size:11px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color: var(--mute); padding-left:2px; }
  .ctrl {
    height:40px; border:1.5px solid var(--line); background: var(--surface); border-radius: var(--radius-sm);
    padding: 0 12px; display:flex; align-items:center; gap:8px; min-width:0;
    font-size:14px; color:var(--ink); transition: border-color .12s, box-shadow .12s;
  }
  .ctrl:hover { border-color:#cdd8e4; }
  .ctrl:focus-within, .ctrl.focused { border-color: var(--sea); box-shadow: 0 0 0 3px var(--sea-soft); }
  .ctrl select, .ctrl input { border:none; outline:none; background:transparent; font:inherit; color:inherit; width:100%; min-width:0; }
  .ctrl .pin { color: var(--sea); flex:0 0 auto; }
  .field.port .ctrl { min-width: 168px; }
  .field.week .ctrl { min-width: 138px; }
  .field.carrier .ctrl { min-width: 150px; }
  .field.export { margin-left:auto; }
  .swap {
    width:32px; height:32px; flex:0 0 auto; border-radius:8px; border:1.5px solid var(--line); background:var(--surface);
    display:grid; place-items:center; color:var(--mute); margin-bottom:4px; transition: all .12s;
  }
  .swap:hover { color: var(--sea); border-color: var(--sea-line); background: var(--sea-soft); }
  .leg-sep { color: var(--sea); display:flex; align-items:center; margin-bottom:9px; }
  .btn {
    height:40px; border-radius: var(--radius-sm); border:1.5px solid transparent; padding: 0 16px;
    font-size:14px; font-weight:600; display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
    transition: background .12s, border-color .12s, color .12s, transform .04s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--sea); color:#fff; }
  .btn-primary:hover { background: var(--sea-2); }
  .btn-ghost { background: var(--surface); border-color: var(--line); color: var(--ink-2); }
  .btn-ghost:hover { border-color:#cdd8e4; background: var(--bg); }
  .btn-soft { background: var(--sea-soft); color: var(--navy); }
  .btn-soft:hover { background: #d8e8f3; }
  .btn-sm { height:32px; padding:0 11px; font-size:13px; border-radius:7px; }
  .btn[disabled] { opacity:.45; pointer-events:none; }

  /* ── body split ── */
  .body { flex:1; display:flex; min-height:0; }

  /* filter rail */
  .filters {
    flex:0 0 auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding: 10px 20px; background: var(--bg); border-bottom:1px solid var(--line);
  }
  .filters .lbl { font-size:12px; color:var(--mute); font-weight:600; margin-right:2px; }
  .chip {
    display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 10px;
    border-radius:999px; border:1.5px solid var(--line); background:var(--surface);
    font-size:13px; font-weight:500; color:var(--ink-2); transition: all .12s;
  }
  .chip:hover { border-color: var(--sea-line); }
  .chip.active { background: var(--navy); color:#fff; border-color: var(--navy); }
  .chip .x { opacity:.6; font-size:15px; line-height:1; }
  .chip .dot { width:7px; height:7px; border-radius:50%; }
  .chip .count { font-size:11px; opacity:.7; }

  .split { flex:1; display:flex; min-height:0; }

  /* list pane */
  .listpane {
    flex:0 0 392px; display:flex; flex-direction:column; min-height:0;
    border-right:1px solid var(--line); background: var(--bg);
  }
  .listhead { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding: 11px 16px 11px 20px; border-bottom:1px solid var(--line); background: var(--bg); }
  .listhead .count b { color: var(--ink); font-weight:700; }
  .listhead .count { color: var(--mute); font-size:13px; }
  .sortsel { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-2); }
  .sortsel select { border:1.5px solid var(--line); background:var(--surface); border-radius:7px; height:30px; padding:0 6px; font:inherit; font-size:13px; color:inherit; outline:none; }

  .list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .grp-label { font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--mute);
    padding: 8px 8px 2px; display:flex; align-items:center; gap:8px; }
  .grp-label::after { content:''; flex:1; height:1px; background: var(--line); }

  /* sailing card */
  .scard {
    background: var(--surface); border:1.5px solid var(--line); border-radius: var(--radius);
    padding: calc(12px * var(--row-h)) 13px; cursor:pointer; position:relative;
    transition: border-color .12s, box-shadow .12s, transform .04s;
  }
  .scard:hover { border-color: var(--sea-line); box-shadow: var(--shadow-sm); }
  .scard.sel { border-color: var(--sea); box-shadow: 0 0 0 3px var(--sea-soft); }
  .scard.sel::before { content:''; position:absolute; left:-1.5px; top:12px; bottom:12px; width:3px; border-radius:3px; background: var(--sea); }
  .scard-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:9px; }
  .scard-route { display:flex; align-items:flex-start; gap:7px; margin-bottom:8px; }
  .port-blk { min-width:0; }
  .pname { font-weight:700; font-size:14px; color:var(--ink); letter-spacing:-.2px; line-height:1.15; white-space:nowrap; }
  .pname.ts-name { font-weight:600; font-size:12.5px; color:var(--ink-3); }
  .pcd { font-size:10.5px; color:var(--mute); margin-top:1px; letter-spacing:.2px; }
  .leg-ico { color: var(--faint); display:flex; align-items:center; margin-top:3px; }
  .ts-mini { font-size:11px; font-weight:600; color:var(--ink-3); background:var(--bg-2); border-radius:5px; padding:2px 6px; }
  .scard-meta { display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--mute); }
  .scard-meta .sep { width:3px; height:3px; border-radius:50%; background: var(--faint); }
  .star { width:28px; height:28px; flex:0 0 auto; border-radius:7px; border:none; background:transparent; color:var(--faint);
    display:grid; place-items:center; transition: all .12s; }
  .star:hover { background: var(--amber-soft); color: var(--amber); }
  .star.on { color: var(--amber); }

  /* carrier badge */
  .cbadge { display:inline-flex; align-items:center; gap:7px; }
  .cbadge .mk { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; color:#fff;
    font-size:10px; font-weight:800; letter-spacing:.2px; flex:0 0 auto; }
  .cbadge .nm { font-weight:700; font-size:13px; color:var(--ink); white-space:nowrap; }
  .cbadge .sv { font-size:11px; color:var(--mute); }

  /* pills */
  .pill { display:inline-flex; align-items:center; gap:5px; height:22px; padding:0 8px; border-radius:6px;
    font-size:11px; font-weight:600; letter-spacing:.2px; }
  .pill.direct { background: var(--green-soft); color: var(--green); }
  .pill.ts { background: var(--sea-soft); color: var(--sea); }
  .pill.tight { background: var(--amber-soft); color: var(--amber); }
  .pill.wk { background: var(--bg-2); color: var(--ink-3); }

  /* detail pane */
  .detail { flex:1; min-width:0; overflow-y:auto; background: var(--bg); }
  .detail-inner { max-width: 880px; margin: 0 auto; padding: 26px 32px 60px; }

  .d-empty { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color: var(--faint); text-align:center; padding:40px; }
  .d-empty .ring { opacity:.5; }

  .d-head { display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:6px; }
  .d-title { font-size:13px; color:var(--mute); font-weight:600; letter-spacing:.3px; margin-bottom:6px; }
  .d-route { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .d-route .big { font-size:30px; font-weight:800; letter-spacing:-.6px; color:var(--ink); line-height:1.05; }
  .d-route .arrow { color: var(--sea); }
  .d-codes { font-size:13px; color:var(--mute); margin-top:6px; letter-spacing:.3px; }
  .d-sub { color: var(--mute); font-size:13.5px; margin-top:10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .d-actions { display:flex; gap:8px; flex:0 0 auto; }

  .summary { display:grid; grid-template-columns: repeat(4, 1fr); gap:1px; background:var(--line); border:1px solid var(--line);
    border-radius: var(--radius); overflow:hidden; margin: 22px 0; }
  .summary .cell { background: var(--surface); padding: 14px 16px; }
  .summary .k { font-size:11px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:var(--mute); margin-bottom:5px; }
  .summary .v { font-size:20px; font-weight:700; color:var(--ink); letter-spacing:-.3px; }
  .summary .v small { font-size:13px; font-weight:600; color:var(--mute); }

  .card-block { background: var(--surface); border:1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
  .block-head { display:flex; align-items:center; justify-content:space-between; padding: 14px 18px; border-bottom:1px solid var(--line-2); }
  .block-head h3 { margin:0; font-size:14px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .block-head .hint { font-size:12px; color:var(--mute); }

  /* timeline */
  .timeline { padding: 8px 20px 18px; }
  .tl-step { display:grid; grid-template-columns: 36px 1fr; gap:0; position:relative; }
  .tl-rail { position:relative; display:flex; justify-content:center; }
  .tl-rail::before { content:''; position:absolute; top:0; bottom:0; width:2px; background: var(--sea-line); }
  .tl-step:first-child .tl-rail::before { top:18px; }
  .tl-step:last-child .tl-rail::before { bottom:auto; height:18px; }
  .tl-node { width:14px; height:14px; border-radius:50%; background:var(--surface); border:3px solid var(--sea); margin-top:15px; z-index:1; }
  .tl-node.port { width:18px; height:18px; background:var(--navy); border-color:var(--navy); box-shadow:0 0 0 4px var(--sea-soft); margin-top:13px; }
  .tl-node.transit { width:8px; height:8px; border-width:2px; border-style:dashed; background:transparent; margin-top:18px; }
  .tl-body { padding: 12px 0 14px 6px; }
  .tl-step:not(:last-child) .tl-body { border-bottom:1px dashed var(--line); }
  .tl-when { font-size:12px; color: var(--sea); font-weight:600; margin-bottom:2px; }
  .tl-what { font-size:14.5px; font-weight:700; color:var(--ink); }
  .tl-detail { font-size:13px; color:var(--ink-3); margin-top:3px; display:flex; flex-wrap:wrap; gap:x; gap:4px 12px; }
  .tl-detail .lab { color: var(--mute); }
  .tl-transit-note { font-size:12.5px; color:var(--mute); font-style:italic; padding: 6px 0; }
  .cutoff-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .cutoff { display:flex; flex-direction:column; gap:1px; background: var(--bg); border:1px solid var(--line); border-radius:8px; padding:6px 10px; }
  .cutoff .cl { font-size:10.5px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; color:var(--mute); }
  .cutoff .cv { font-size:12.5px; font-weight:600; color:var(--ink-2); }
  .cutoff.soon { border-color: var(--amber); background: var(--amber-soft); }
  .cutoff.soon .cv { color: var(--amber); }

  /* vessel / kv cards */
  .kv-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-top:18px; }
  .vessel-card { background: var(--surface); border:1px solid var(--line); border-radius: var(--radius); padding:16px 18px; box-shadow: var(--shadow-sm); }
  .vessel-card .role { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--sea); margin-bottom:8px; display:flex; align-items:center; gap:7px; }
  .vessel-card .vn { font-size:17px; font-weight:700; color:var(--ink); letter-spacing:-.2px; }
  .vessel-card .vmeta { font-size:12.5px; color:var(--mute); margin-top:4px; display:flex; gap:12px; flex-wrap:wrap; }
  .vessel-card .vmeta .mono { color:var(--ink-3); }
  .vessel-card.empty { display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--faint); border-style:dashed; text-align:center; }

  /* route strip */
  .routestrip { display:flex; align-items:stretch; gap:0; padding: 18px 20px; overflow-x:auto; }
  .rs-port { display:flex; flex-direction:column; align-items:center; gap:4px; flex:0 0 auto; min-width:54px; }
  .rs-port .pc { font-weight:700; font-size:12.5px; white-space:nowrap; }
  .rs-port .pn { font-size:10.5px; color:var(--mute); }
  .rs-port .seg-dot { width:11px; height:11px; border-radius:50%; background:var(--sea-line); border:2px solid var(--sea); margin-bottom:3px; }
  .rs-port.endpoint .seg-dot { background:var(--navy); border-color:var(--navy); width:13px; height:13px; }
  .rs-link { flex:1 1 36px; min-width:28px; display:flex; align-items:flex-start; padding-top:5px; }
  .rs-link .line { height:2px; width:100%; background: repeating-linear-gradient(90deg, var(--sea-line) 0 6px, transparent 6px 10px); }
  .rs-link.solid .line { background: var(--sea-line); }

  /* shortlist tray */
  .tray {
    position: fixed; right: 22px; bottom: 22px; z-index: 40;
    background: var(--navy); color:#fff; border-radius: var(--radius); box-shadow: var(--shadow-lg);
    display:flex; align-items:center; gap:14px; padding: 11px 14px 11px 16px;
    transform: translateY(140%); opacity:0; transition: transform .28s cubic-bezier(.2,.8,.3,1), opacity .2s;
  }
  .tray.show { transform: translateY(0); opacity:1; }
  .tray .ct { display:flex; align-items:center; gap:9px; font-size:13.5px; }
  .tray .ct b { background: rgba(255,255,255,.15); border-radius:6px; min-width:22px; height:22px; display:inline-grid; place-items:center; font-size:13px; }
  .tray .btn { height:34px; }

  /* toast */
  .toast { position: fixed; left:50%; bottom:26px; transform: translateX(-50%) translateY(20px); z-index:60;
    background: var(--ink); color:#fff; padding:10px 16px; border-radius:9px; font-size:13.5px; font-weight:500;
    box-shadow: var(--shadow-lg); opacity:0; pointer-events:none; transition: opacity .2s, transform .2s; display:flex; align-items:center; gap:9px; }
  .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

  .stale-banner { display:flex; align-items:center; gap:9px; background: var(--amber-soft); color: var(--amber);
    border:1px solid #ecd8a8; border-radius:9px; padding:9px 13px; font-size:13px; font-weight:500; margin-bottom:18px; }

  .data-foot { text-align:center; color:var(--faint); font-size:12px; padding: 24px 0 4px; }

  /* ── empty / edge state ── */
  .dataempty { flex:1; display:flex; align-items:center; justify-content:center; padding:40px; background: var(--bg); }
  .de-card { max-width: 420px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .de-ico { width:72px; height:72px; border-radius:18px; display:grid; place-items:center; color: var(--sea);
    background: var(--sea-soft); border:1px solid var(--sea-line); margin-bottom:10px; }
  .de-ico.err { color: var(--amber); background: var(--amber-soft); border-color:#ecd8a8; }
  .de-head { font-size:24px; font-weight:800; letter-spacing:1px; color: var(--ink); }
  .de-sub { color: var(--mute); font-size:14px; margin:4px 0 14px; line-height:1.55; }

  /* responsive — tablet */
  .backbtn { display:none; }
  @media (max-width: 1020px) {
    .listpane { flex-basis: 340px; }
    .detail-inner { padding: 22px 24px 60px; }
    .kv-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 860px) {
    .split { position: relative; }
    .listpane { flex: 1 1 100%; border-right:none; }
    .detail { display:none; }
    .app.detailview .listpane { display:none; }
    .app.detailview .detail { display:block; flex:1 1 100%; }
    .backbtn { display:inline-flex; }
    .summary { grid-template-columns: repeat(2,1fr); }
    .searchbar { flex-wrap:wrap; }
    .field.port .ctrl, .field.week .ctrl, .field.carrier .ctrl { min-width:120px; }
  }

  /* focus ring for keyboard */
  .scard:focus-visible { outline:none; border-color:var(--sea); box-shadow:0 0 0 3px var(--sea-soft); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
